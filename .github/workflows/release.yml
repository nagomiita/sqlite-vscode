name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build VSIX and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare release version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            git fetch --tags --force

            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
            if [ -z "${latest_tag}" ]; then
              latest_tag="v0.0.0"
            fi

            latest_version="${latest_tag#v}"
            IFS=. read -r major minor patch <<< "${latest_version}"
            next_version="${major}.${minor}.$((patch + 1))"
            release_tag="v${next_version}"

            if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
              echo "Release tag ${release_tag} already exists."
              exit 1
            fi

            npm version "${next_version}" --no-git-tag-version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json
            git commit -m "chore: release ${release_tag} [skip ci]"
            git tag "${release_tag}"
            git push origin "HEAD:${REF_NAME}"
            git push origin "${release_tag}"
          else
            release_tag="${REF_NAME}"
          fi

          version="$(node -p "require('./package.json').version")"
          if [ "${release_tag}" != "v${version}" ]; then
            echo "Release tag ${release_tag} does not match package version v${version}."
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Package VSIX
        run: npm run package

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          vsix="$(ls ./*.vsix | head -n 1)"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${vsix}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${vsix}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
