name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.0.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build VSIX and publish GitHub Release
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${RELEASE_TAG}" != "v${version}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version v${version}."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Package VSIX
        run: npm run package

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          vsix="$(ls ./*.vsix | head -n 1)"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${vsix}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${vsix}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
