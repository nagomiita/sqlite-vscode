name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    name: Build VSIX and publish GitHub Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare release version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${EVENT_NAME}" = "workflow_run" ]; then
            git fetch --tags --force

            if [ "${EVENT_NAME}" = "workflow_run" ]; then
              remote_head="$(git ls-remote origin "refs/heads/${REF_NAME}" | awk '{print $1}')"
              local_head="$(git rev-parse HEAD)"
              if [ "${local_head}" != "${remote_head}" ]; then
                echo "Skip release: ${local_head} is no longer origin/${REF_NAME} (${remote_head})."
                echo "skip=true" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            fi

            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
            if [ -z "${latest_tag}" ]; then
              latest_tag="v0.0.0"
            fi

            latest_version="${latest_tag#v}"
            current_version="$(node -p "require('./package.json').version")"
            base_version="$(printf '%s\n%s\n' "${latest_version}" "${current_version}" | sort -V | tail -n 1)"
            IFS=. read -r major minor patch <<< "${base_version}"
            next_version="${major}.${minor}.$((patch + 1))"
            release_tag="v${next_version}"

            if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
              echo "Release tag ${release_tag} already exists."
              exit 1
            fi

            npm version "${next_version}" --no-git-tag-version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json
            git commit -m "chore: release ${release_tag} [skip ci]"
            git push origin "HEAD:${REF_NAME}"
            release_target="$(git rev-parse HEAD)"
          else
            release_tag="${REF_NAME}"
            release_target=""
          fi

          version="$(node -p "require('./package.json').version")"
          if [ "${release_tag}" != "v${version}" ]; then
            echo "Release tag ${release_tag} does not match package version v${version}."
            exit 1
          fi

          echo "skip=false" >> "${GITHUB_OUTPUT}"
          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "target=${release_target}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        if: steps.release.outputs.skip != 'true'
        run: npm ci

      - name: Typecheck
        if: steps.release.outputs.skip != 'true'
        run: npm run typecheck

      - name: Package VSIX
        if: steps.release.outputs.skip != 'true'
        run: npm run package

      - name: Publish GitHub Release
        if: steps.release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TARGET: ${{ steps.release.outputs.target }}
        run: |
          vsix="$(ls ./*.vsix | head -n 1)"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${vsix}" --clobber
          elif [ -n "${RELEASE_TARGET}" ]; then
            gh release create "${RELEASE_TAG}" "${vsix}" \
              --target "${RELEASE_TARGET}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          else
            gh release create "${RELEASE_TAG}" "${vsix}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
